<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseNews – Live Intelligence</title>
<style>
  /* ── TOKENS ─────────────────────────────────────────────── */
  :root {
    --ink:      #0d0d0d;
    --paper:    #f7f5f0;
    --lead:     #1a1a2e;
    --accent:   #e63946;
    --muted:    #6b6b6b;
    --border:   #d8d5ce;
    --card-bg:  #ffffff;
    --nav-h:    56px;
    --radius:   4px;
    --serif:    'Georgia', 'Times New Roman', serif;
    --sans:     'Inter', system-ui, -apple-system, sans-serif;
    --mono:     'JetBrains Mono', 'Courier New', monospace;
    --ease:     cubic-bezier(.22,.68,0,1.2);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink:    #e8e6df;
      --paper:  #121212;
      --lead:   #1f1f35;
      --muted:  #9a9a9a;
      --border: #2a2a2a;
      --card-bg:#1c1c1c;
    }
  }

  /* ── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; border: none; background: none; font: inherit; }

  /* ── MASTHEAD ───────────────────────────────────────────── */
  .masthead {
    background: var(--lead);
    color: #fff;
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: var(--nav-h);
    border-bottom: 3px solid var(--accent);
  }
  .brand {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .brand span { color: var(--accent); }

  /* Nav tabs */
  .nav-tabs {
    display: flex;
    gap: 0;
    list-style: none;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tabs li button {
    padding: 0 1rem;
    height: var(--nav-h);
    color: rgba(255,255,255,.65);
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    transition: color .2s, background .2s;
    white-space: nowrap;
    position: relative;
  }
  .nav-tabs li button::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform .25s var(--ease);
  }
  .nav-tabs li button:hover,
  .nav-tabs li button.active { color: #fff; }
  .nav-tabs li button.active::after { transform: scaleX(1); }

  /* Search */
  .search-wrap {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,.1);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }
  .search-wrap input {
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: .85rem;
    padding: .4rem .75rem;
    width: 180px;
    transition: width .3s;
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,.45); }
  .search-wrap input:focus { width: 240px; }
  .search-wrap button {
    padding: .4rem .6rem;
    color: rgba(255,255,255,.7);
    font-size: 1rem;
    transition: color .2s;
  }
  .search-wrap button:hover { color: #fff; }

  /* ── BREAKING TICKER ────────────────────────────────────── */
  .ticker-bar {
    background: var(--accent);
    color: #fff;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    overflow: hidden;
    height: 32px;
  }
  .ticker-label {
    background: rgba(0,0,0,.25);
    padding: 0 1rem;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    text-transform: uppercase;
    font-size: .72rem;
  }
  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 35s linear infinite;
  }
  .ticker-track span { padding: 0 3rem; }
  @keyframes ticker {
    from { transform: translateX(100vw); }
    to   { transform: translateX(-100%); }
  }

  /* ── LAYOUT ─────────────────────────────────────────────── */
  .container { max-width: 1180px; margin: 0 auto; padding: 0 1.25rem; }
  main { padding: 2rem 0 4rem; }

  /* Section label */
  .section-label {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .5rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── HERO GRID ──────────────────────────────────────────── */
  .hero-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2.5rem;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .hero-main { grid-row: 1 / 3; }
  .hero-card {
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .hero-main .hero-thumb { height: 400px; }
  .hero-side .hero-thumb { height: 195px; }
  .hero-overlay {
    padding: 1.25rem;
    position: relative;
  }
  .hero-cat {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .35rem;
  }
  .hero-main .hero-overlay h2 {
    font-family: var(--serif);
    font-size: 1.75rem;
    line-height: 1.25;
    font-weight: 700;
    margin-bottom: .5rem;
  }
  .hero-side .hero-overlay h3 {
    font-family: var(--serif);
    font-size: 1rem;
    line-height: 1.35;
    font-weight: 700;
    margin-bottom: .35rem;
  }
  .hero-meta {
    font-size: .75rem;
    color: var(--muted);
  }
  .hero-card:hover .hero-thumb img { transform: scale(1.04); }
  .hero-thumb img { transition: transform .5s ease; height: 100%; }

  /* ── ARTICLE GRID ───────────────────────────────────────── */
  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .article-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .25s, transform .25s;
  }
  .article-card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    transform: translateY(-2px);
  }
  .article-thumb { height: 180px; overflow: hidden; }
  .article-thumb img { height: 100%; transition: transform .4s ease; }
  .article-card:hover .article-thumb img { transform: scale(1.05); }
  .article-body { padding: 1rem; }
  .article-cat {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .3rem;
  }
  .article-body h3 {
    font-family: var(--serif);
    font-size: .97rem;
    line-height: 1.4;
    font-weight: 700;
    margin-bottom: .5rem;
  }
  .article-body p {
    font-size: .82rem;
    color: var(--muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article-meta {
    font-size: .72rem;
    color: var(--muted);
    margin-top: .75rem;
    padding-top: .6rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  /* ── ARTICLE DETAIL (MODAL) ─────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card-bg);
    max-width: 720px;
    width: 100%;
    border-radius: 6px;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform .3s var(--ease);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-img { height: 360px; }
  .modal-content { padding: 2rem; }
  .modal-cat {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .4rem;
  }
  .modal-content h1 {
    font-family: var(--serif);
    font-size: 2rem;
    line-height: 1.22;
    margin-bottom: .75rem;
  }
  .modal-byline {
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-body {
    font-size: 1rem;
    line-height: 1.75;
  }
  .modal-body p + p { margin-top: 1rem; }
  .modal-close {
    position: absolute;
    top: .75rem; right: .75rem;
    background: rgba(0,0,0,.5);
    color: #fff;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    z-index: 1;
  }
  .modal-close:hover { background: var(--accent); }
  .modal-wrap { position: relative; }

  /* ── LOADING STATES ─────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--paper) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .skeleton-thumb { height: 180px; }
  .skeleton-body { padding: 1rem; }
  .skeleton-line { height: 12px; margin-bottom: .65rem; border-radius: 4px; }
  .skeleton-line.short { width: 55%; }

  /* ── SPINNER ────────────────────────────────────────────── */
  .spinner {
    display: flex; align-items: center; justify-content: center;
    gap: .5rem; padding: 2rem;
    font-size: .85rem; color: var(--muted);
  }
  .spinner::before {
    content: '';
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SEARCH RESULTS ─────────────────────────────────────── */
  .search-badge {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    background: var(--lead);
    color: #fff;
    font-size: .78rem;
    padding: .3rem .75rem;
    border-radius: 20px;
    margin-bottom: 1.25rem;
  }
  .search-badge button {
    color: rgba(255,255,255,.6);
    font-size: .9rem;
    line-height: 1;
    padding: 0 0 0 .25rem;
  }
  .search-badge button:hover { color: #fff; }

  /* ── LOAD MORE ──────────────────────────────────────────── */
  .load-more-wrap { text-align: center; margin-top: 1.5rem; }
  .btn-load-more {
    background: var(--lead);
    color: #fff;
    padding: .65rem 2rem;
    border-radius: var(--radius);
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .04em;
    transition: background .2s, transform .15s;
  }
  .btn-load-more:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-load-more:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── FOOTER ─────────────────────────────────────────────── */
  footer {
    background: var(--lead);
    color: rgba(255,255,255,.55);
    font-size: .8rem;
    padding: 1.5rem;
    text-align: center;
    border-top: 3px solid var(--accent);
  }
  footer strong { color: #fff; }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 720px) {
    .hero-grid { grid-template-columns: 1fr; }
    .hero-main { grid-row: auto; }
    .hero-main .hero-thumb { height: 220px; }
    .hero-side .hero-thumb { height: 160px; }
    .search-wrap input { width: 120px; }
    .search-wrap input:focus { width: 150px; }
    .brand { font-size: 1.2rem; }
    .modal-content h1 { font-size: 1.4rem; }
    .modal-img { height: 220px; }
  }
  @media (max-width: 480px) {
    :root { --nav-h: 50px; }
    .masthead { gap: .75rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .ticker-track, .skeleton { animation: none; }
    * { transition: none !important; }
  }

  /* ── EMPTY/ERROR ────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .empty-state p { max-width: 380px; margin: 0 auto; }
</style>
</head>
<body>

<!-- ── MASTHEAD ── -->
<header class="masthead">
  <div class="brand">Pulse<span>News</span></div>
  <nav>
    <ul class="nav-tabs" id="navTabs">
      <li><button class="active" data-cat="all">All</button></li>
      <li><button data-cat="world">World</button></li>
      <li><button data-cat="local">Local</button></li>
      <li><button data-cat="sports">Sports</button></li>
      <li><button data-cat="entertainment">Entertainment</button></li>
      <li><button data-cat="technology">Technology</button></li>
      <li><button data-cat="science">Science</button></li>
    </ul>
  </nav>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search articles…" autocomplete="off"/>
    <button id="searchBtn" title="Search">🔍</button>
  </div>
</header>

<!-- ── BREAKING TICKER ── -->
<div class="ticker-bar">
  <div class="ticker-label">🔴 Breaking</div>
  <div class="ticker-track" id="tickerTrack">
    <span>Loading latest headlines…</span>
  </div>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="container">
    <div id="searchBadge" style="display:none"></div>
    <div class="section-label" id="sectionLabel">Today's Top Stories</div>

    <!-- Hero Grid -->
    <div class="hero-grid" id="heroGrid"></div>

    <!-- Article Grid -->
    <div class="section-label" id="moreLabel" style="margin-top:2rem">More Stories</div>
    <div class="articles-grid" id="articlesGrid"></div>

    <div class="load-more-wrap">
      <button class="btn-load-more" id="loadMoreBtn">Load More Stories</button>
    </div>
  </div>
</main>

<!-- ── ARTICLE MODAL ── -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal-wrap">
    <button class="modal-close" id="modalClose" aria-label="Close article">✕</button>
    <div class="modal" id="modalPanel">
      <div class="modal-img"><img id="modalImg" src="" alt=""/></div>
      <div class="modal-content">
        <div class="modal-cat" id="modalCat"></div>
        <h1 id="modalTitle"></h1>
        <div class="modal-byline" id="modalByline"></div>
        <div class="modal-body" id="modalBody"><div class="spinner">Generating full article…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  <strong>PulseNews</strong> · Powered by Claude AI · © 2026 · All content is AI-generated for demonstration purposes.
</footer>

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const state = {
  category: 'all',
  searchQuery: '',
  articles: [],
  page: 1,
  loading: false,
  totalLoaded: 0
};

const HERO_COUNT = 3;
const PAGE_SIZE  = 6;

/* ══════════════════════════════════════════════════════════
   CLAUDE API
══════════════════════════════════════════════════════════ */
async function callClaude(prompt, systemPrompt = '') {
  const messages = [{ role: 'user', content: prompt }];
  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 1000,
    messages,
  };
  if (systemPrompt) body.system = systemPrompt;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  return data.content.map(b => b.text || '').join('');
}

/* ══════════════════════════════════════════════════════════
   GENERATE ARTICLES
══════════════════════════════════════════════════════════ */
const CATEGORIES = ['World', 'Local', 'Sports', 'Entertainment', 'Technology', 'Science'];

function pickCategory(filter) {
  if (filter && filter !== 'all') {
    return filter.charAt(0).toUpperCase() + filter.slice(1);
  }
  return CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
}

const PLACEHOLDER_PALETTES = [
  '1a1a2e/e63946', '2d6a4f/ffffff', '023e8a/90e0ef',
  '6d2b3d/ffd166', '3d405b/f4f1de', '2b2d42/ef233c',
];

function thumbUrl(id, w = 600, h = 360) {
  const palette = PLACEHOLDER_PALETTES[id % PLACEHOLDER_PALETTES.length];
  return `https://via.placeholder.com/${w}x${h}/${palette}?text=`;
}

async function fetchArticles(count = PAGE_SIZE) {
  const catFilter = state.category !== 'all' ? state.category : null;
  const searchHint = state.searchQuery ? ` about "${state.searchQuery}"` : '';
  const catHint = catFilter ? ` in the ${catFilter} category` : '';
  const offset = state.totalLoaded;

  const prompt = `Generate ${count} unique, realistic, diverse news article summaries${catHint}${searchHint}.
Return ONLY a JSON array (no markdown, no preamble) with objects having these exact keys:
id, category, headline, summary, author, date, readTime
- id: integer starting from ${offset + 1}
- category: one of World/Local/Sports/Entertainment/Technology/Science
- headline: compelling, specific news headline (max 90 chars)
- summary: 2-sentence engaging summary
- author: realistic journalist name
- date: recent date like "June 24, 2026"
- readTime: "X min read" (2-8 min)
Make headlines varied and newsworthy. No duplicate topics.`;

  const raw = await callClaude(prompt, 'You are a professional news editor. Return only valid JSON arrays with no markdown formatting.');

  let arr;
  try {
    const clean = raw.replace(/```json|```/g, '').trim();
    arr = JSON.parse(clean);
  } catch {
    // fallback
    arr = Array.from({ length: count }, (_, i) => ({
      id: offset + i + 1,
      category: pickCategory(catFilter),
      headline: `Breaking: Major development shakes global markets — story ${offset + i + 1}`,
      summary: 'Analysts are closely monitoring the situation as new details emerge. Officials have promised a full statement later today.',
      author: 'Staff Reporter',
      date: 'June 24, 2026',
      readTime: `${Math.floor(Math.random() * 5) + 2} min read`,
    }));
  }
  return arr;
}

/* ══════════════════════════════════════════════════════════
   GENERATE FULL ARTICLE CONTENT
══════════════════════════════════════════════════════════ */
async function fetchFullArticle(article) {
  const prompt = `Write the full article for this news story.
Headline: "${article.headline}"
Category: ${article.category}
Summary: ${article.summary}

Write 4–5 solid paragraphs of professional journalism. Include quotes from officials or experts. No headline or byline — just the body text. Separate paragraphs with a blank line.`;
  return callClaude(prompt, 'You are a senior journalist writing for a reputable newspaper.');
}

/* ══════════════════════════════════════════════════════════
   GENERATE TICKER
══════════════════════════════════════════════════════════ */
async function loadTicker() {
  try {
    const raw = await callClaude(
      'Generate 8 very short breaking news headlines (max 12 words each). Return ONLY a JSON array of strings.',
      'Return only valid JSON.'
    );
    const clean = raw.replace(/```json|```/g, '').trim();
    const items = JSON.parse(clean);
    const track = document.getElementById('tickerTrack');
    track.innerHTML = items.map(t => `<span>📌 ${t}</span>`).join('');
  } catch { /* keep default */ }
}

/* ══════════════════════════════════════════════════════════
   RENDER HELPERS
══════════════════════════════════════════════════════════ */
function catBadge(cat) {
  const colors = {
    World:'#e63946', Local:'#2d6a4f', Sports:'#023e8a',
    Entertainment:'#6d2b3d', Technology:'#3d405b', Science:'#2b2d42',
  };
  return `<div class="hero-cat" style="color:${colors[cat]||'var(--accent)'}">${cat}</div>`;
}

function renderHeroGrid(articles) {
  const grid = document.getElementById('heroGrid');
  if (!articles.length) { grid.innerHTML = ''; return; }

  const [main, ...sides] = articles;

  const mainHtml = `
    <div class="hero-card hero-main" data-id="${main.id}">
      <div class="hero-thumb">
        <img src="${thumbUrl(main.id, 800, 440)}" alt="${main.headline}" loading="lazy"/>
      </div>
      <div class="hero-overlay">
        ${catBadge(main.category)}
        <h2>${main.headline}</h2>
        <div class="hero-meta">By ${main.author} · ${main.date} · ${main.readTime}</div>
      </div>
    </div>`;

  const sidesHtml = sides.map(a => `
    <div class="hero-card hero-side" data-id="${a.id}">
      <div class="hero-thumb">
        <img src="${thumbUrl(a.id, 500, 220)}" alt="${a.headline}" loading="lazy"/>
      </div>
      <div class="hero-overlay">
        ${catBadge(a.category)}
        <h3>${a.headline}</h3>
        <div class="hero-meta">${a.author} · ${a.readTime}</div>
      </div>
    </div>`).join('');

  grid.innerHTML = mainHtml + sidesHtml;
}

function renderArticleCard(a) {
  return `
  <div class="article-card" data-id="${a.id}">
    <div class="article-thumb">
      <img src="${thumbUrl(a.id, 560, 200)}" alt="${a.headline}" loading="lazy"/>
    </div>
    <div class="article-body">
      <div class="article-cat">${a.category}</div>
      <h3>${a.headline}</h3>
      <p>${a.summary}</p>
      <div class="article-meta">
        <span>${a.author}</span>
        <span>${a.readTime}</span>
      </div>
    </div>
  </div>`;
}

function renderSkeletons(n) {
  return Array.from({ length: n }, () => `
  <div class="skeleton-card">
    <div class="skeleton skeleton-thumb"></div>
    <div class="skeleton-body">
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>
  </div>`).join('');
}

/* ══════════════════════════════════════════════════════════
   LOAD ARTICLES
══════════════════════════════════════════════════════════ */
async function loadArticles(reset = false) {
  if (state.loading) return;
  state.loading = true;

  const grid   = document.getElementById('articlesGrid');
  const heroEl = document.getElementById('heroGrid');
  const btn    = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'Loading…';

  if (reset) {
    state.articles = [];
    state.totalLoaded = 0;
    heroEl.innerHTML = `<div class="skeleton-card hero-main hero-card"><div class="skeleton skeleton-thumb" style="height:400px"></div></div>`;
    grid.innerHTML = renderSkeletons(PAGE_SIZE);
  } else {
    grid.insertAdjacentHTML('beforeend', renderSkeletons(PAGE_SIZE));
  }

  try {
    const count = reset ? HERO_COUNT + PAGE_SIZE : PAGE_SIZE;
    const fresh = await fetchArticles(count);

    if (reset) {
      state.articles = fresh;
      const heroes = fresh.slice(0, HERO_COUNT);
      const rest   = fresh.slice(HERO_COUNT);
      renderHeroGrid(heroes);
      grid.innerHTML = rest.map(renderArticleCard).join('');
    } else {
      state.articles.push(...fresh);
      // remove skeletons then append
      const skeletons = grid.querySelectorAll('.skeleton-card');
      skeletons.forEach(s => s.remove());
      fresh.forEach(a => grid.insertAdjacentHTML('beforeend', renderArticleCard(a)));
    }

    state.totalLoaded += fresh.length;
    attachCardListeners();
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">⚠️</div>
      <p>Could not load articles. Check your connection and try again.</p>
    </div>`;
    console.error(err);
  }

  state.loading = false;
  btn.disabled = false;
  btn.textContent = 'Load More Stories';
}

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
function openModal(article) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalImg').src = thumbUrl(article.id, 800, 420);
  document.getElementById('modalImg').alt = article.headline;
  document.getElementById('modalCat').textContent = article.category;
  document.getElementById('modalTitle').textContent = article.headline;
  document.getElementById('modalByline').innerHTML =
    `By <strong>${article.author}</strong> · <span>${article.date}</span> · <span>${article.readTime}</span>`;
  document.getElementById('modalBody').innerHTML = '<div class="spinner">Generating full article…</div>';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetchFullArticle(article).then(text => {
    const paras = text.trim().split(/\n\n+/).map(p => `<p>${p.trim()}</p>`).join('');
    document.getElementById('modalBody').innerHTML = paras;
  }).catch(() => {
    document.getElementById('modalBody').innerHTML = `<p>${article.summary}</p><p>Full article unavailable. Please try again later.</p>`;
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ══════════════════════════════════════════════════════════
   EVENT WIRING
══════════════════════════════════════════════════════════ */
function attachCardListeners() {
  document.querySelectorAll('[data-id]').forEach(card => {
    card.onclick = () => {
      const id = parseInt(card.dataset.id);
      const article = state.articles.find(a => a.id === id);
      if (article) openModal(article);
    };
  });
}

// Nav tabs
document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('button[data-cat]');
  if (!btn) return;
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.category = btn.dataset.cat;
  state.searchQuery = '';
  document.getElementById('searchInput').value = '';
  hideSarchBadge();
  const label = btn.dataset.cat === 'all' ? "Today's Top Stories"
    : btn.dataset.cat.charAt(0).toUpperCase() + btn.dataset.cat.slice(1) + ' News';
  document.getElementById('sectionLabel').textContent = label;
  loadArticles(true);
});

// Search
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  state.searchQuery = q;
  state.category = 'all';
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector('.nav-tabs button[data-cat="all"]').classList.add('active');
  document.getElementById('sectionLabel').textContent = `Search: "${q}"`;
  showSearchBadge(q);
  loadArticles(true);
}

function showSearchBadge(q) {
  const el = document.getElementById('searchBadge');
  el.style.display = 'block';
  el.innerHTML = `<div class="search-badge">Showing results for "<strong>${q}</strong>"
    <button id="clearSearch" title="Clear search">✕</button></div>`;
  document.getElementById('clearSearch').onclick = () => {
    state.searchQuery = '';
    document.getElementById('searchInput').value = '';
    hideSarchBadge();
    document.getElementById('sectionLabel').textContent = "Today's Top Stories";
    loadArticles(true);
  };
}

function hideSarchBadge() {
  document.getElementById('searchBadge').style.display = 'none';
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click', () => loadArticles(false));

// Modal close
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
loadArticles(true);
loadTicker();
</script>
</body>
</html>
